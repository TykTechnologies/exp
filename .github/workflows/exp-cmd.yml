# yamllint disable rule:line-length
---
name: Exp repo cmd/ builds

on:  # yamllint disable-line rule:truthy
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'cmd/**'
      - '.github/workflows/exp-cmd.yml'
      - go.mod
      - go.sum
  push:
    branches:
      - main
    paths:
      - 'cmd/**'
      - '.github/workflows/exp-cmd.yml'
      - go.mod
      - go.sum

jobs:
  dependency-guard:
    if: github.event_name == 'pull_request'
    uses: TykTechnologies/github-actions/.github/workflows/dependency-guard.yml@d3fa20888fa2878e877e22bb7702141217290e7c  # main

  exp-cmd-build:
    needs: [dependency-guard]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        with:
          app-id: ${{ secrets.PROBE_APP_ID }}
          private-key: ${{ secrets.PROBE_APP_PRIVATE_KEY }}
          owner: TykTechnologies

      - name: Checkout PR
        uses: TykTechnologies/exp/.github/actions/checkout-pr@49245597f0620ef8460735bb0ae6e93be5f8ca51  # main
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Golang
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed  # v5.1.0
        with:
          go-version: '1.21.x'

      - working-directory: ./cmd/go-fsck
        run: go build .

      - working-directory: ./cmd/schema-gen
        run: go build .

      - name: Send event to tyk-github-actions
        uses: ./.github/actions/github-sync
        if: github.event_name == 'push'
        with:
          repository: TykTechnologies/github-actions # dispatch-target
          eventType: exp-cmd
          token: ${{ steps.app-token.outputs.token }}

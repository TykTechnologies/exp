# yamllint disable rule:line-length
---
version: "3"

tasks:
  default:
    desc: Lint actions
    deps:
      - install:shellcheck
      - install:actionlint
    cmds:
      - actionlint -ignore SC2081 -ignore SC2086 -ignore SC2129 -verbose
      - yamllint .github

  install:actionlint:
    desc: Install actionlint
    internal: true
    status:
      - type actionlint
    cmds:
      - |
        VERSION=v1.7.7
        go install github.com/rhysd/actionlint/cmd/actionlint@${VERSION}

  install:shellcheck:
    desc: Install shellcheck
    internal: true
    status:
      - type shellcheck
    cmds:
      - apt install shellcheck
